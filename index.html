<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px;
      text-align: right;
      margin-bottom: 20px;
    }

    .display .expression {
      color: #a8b2d8;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .display .result {
      color: #e94560;
      font-size: 36px;
      font-weight: bold;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active { transform: scale(0.94); opacity: 0.8; }

    .btn-number  { background: #1a1a2e; color: #e0e0e0; }
    .btn-op      { background: #e94560; color: #fff; }
    .btn-clear   { background: #0f3460; color: #e94560; }
    .btn-equal   { background: #e94560; color: #fff; grid-column: span 2; }
    .btn-zero    { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="deleteLast()">⌫</button>
      <button class="btn-op"    onclick="inputOp('%')">%</button>
      <button class="btn-op"    onclick="inputOp('/')">÷</button>

      <button class="btn-number" onclick="inputNum('7')">7</button>
      <button class="btn-number" onclick="inputNum('8')">8</button>
      <button class="btn-number" onclick="inputNum('9')">9</button>
      <button class="btn-op"     onclick="inputOp('*')">×</button>

      <button class="btn-number" onclick="inputNum('4')">4</button>
      <button class="btn-number" onclick="inputNum('5')">5</button>
      <button class="btn-number" onclick="inputNum('6')">6</button>
      <button class="btn-op"     onclick="inputOp('-')">−</button>

      <button class="btn-number" onclick="inputNum('1')">1</button>
      <button class="btn-number" onclick="inputNum('2')">2</button>
      <button class="btn-number" onclick="inputNum('3')">3</button>
      <button class="btn-op"     onclick="inputOp('+')">+</button>

      <button class="btn-number btn-zero" onclick="inputNum('0')">0</button>
      <button class="btn-number" onclick="inputNum('.')">.</button>
      <button class="btn-equal"  onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let expression = '';

    function updateDisplay() {
      document.getElementById('expression').textContent = expression;
    }

    function inputNum(n) {
      expression += n;
      updateDisplay();
      document.getElementById('result').textContent = expression;
    }

    function inputOp(op) {
      if (expression === '' && op !== '-') return;
      expression += op;
      updateDisplay();
      document.getElementById('result').textContent = expression;
    }

    function calculate() {
      try {
        const result = Function('"use strict"; return (' + expression + ')')();
        document.getElementById('expression').textContent = expression + ' =';
        document.getElementById('result').textContent = result;
        expression = String(result);
      } catch {
        document.getElementById('result').textContent = 'Error';
        expression = '';
      }
    }

    function clearAll() {
      expression = '';
      document.getElementById('expression').textContent = '';
      document.getElementById('result').textContent = '0';
    }

    function deleteLast() {
      expression = expression.slice(0, -1);
      document.getElementById('result').textContent = expression || '0';
      updateDisplay();
    }
  </script>
</body>
</html>
