name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest

      # GitHub Secrets에 등록한 값을 환경변수로 주입
      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
        run: pytest test_calculator.py -v

  lint:
    name: Code Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: flake8 calculator.py --max-line-length=88
